<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Spotter | Atelier Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor"></div><div class="cursor-trail"></div>

    <header class="nav">
        <div class="logoBox">
            <img src="logo.jpg" alt="Car Spotter" class="luxury-logo-svg" style="width: 45px; height: 45px; border-radius: 50%;">
            <h1 class="logo-text">CAR SPOTTER</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html">Showroom</a>
            <a href="inventory.html">Catalogo</a>
            <a href="configuratore.html" class="active">Configuratore</a>
            <a href="assistenza.html">Concierge</a>
        </nav>
        <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
    </header>

    <section class="top-space reveal">
        <span class="gold-tag">Atelier Su Misura</span>
        <h2 style="font-size: 3rem; margin: 10px 0;">SARTORIA AUTOMOBILISTICA</h2>
    </section>

    <div class="grid reveal" style="padding-top: 20px;">
        <div class="glass-panel" style="padding: 20px; text-align: center;">
            <div id="visualCarFrame">
                Bugatti Chiron<br><span style="font-size: 1rem; color: #fff;">Scegli specifiche...</span>
            </div>
            <div id="specLog" style="margin-top: 15px; font-size: 0.8rem; color: var(--gold); font-family: monospace;">
                Motore di Rendering Attivo.
            </div>
        </div>

        <div class="glass-panel" style="padding: 40px;">
            <h3 style="color: var(--gold);">1. Piattaforma</h3>
            <select id="model" onchange="updateConfigurator()">
                <option value="bugatti">Bugatti Chiron V16</option>
                <option value="f40">Ferrari F40 Restomod</option>
                <option value="jesko">Koenigsegg Jesko Absolut</option>
            </select>

            <h3 style="color: var(--gold); margin-top: 30px;">2. Prospettiva Atelier</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="btn-esterno" class="gold-btn active" onclick="setView('esterno')" style="margin-top: 0;">Esterni</button>
                <button id="btn-interno" class="gold-btn" onclick="setView('interno')" style="margin-top: 0;">Cockpit</button>
            </div>

            <h3 style="color: var(--gold); margin-top: 30px;">3. Tonalità Livrea</h3>
            <select id="color" onchange="updateConfigurator()">
                <option value="oro">Oro Zecchino Satinato</option>
                <option value="carbonio">Carbonio a Vista Liquido</option>
                <option value="nero">Nero Ossidiana</option>
            </select>
            
            <button class="gold-btn magnetic-btn" onclick="salvaConfigurazione()" style="margin-top: 40px;">Invia Ordine al Concierge</button>
        </div>
    </div>

    <footer><p>CAR SPOTTER © 2026 — Rendering Olografico Prototypes</p></footer>

    <script src="script.js"></script>
</body>
</html>
