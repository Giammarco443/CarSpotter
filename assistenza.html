<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Spotter | VIP Concierge</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="custom-cursor"></div><div class="cursor-trail"></div>

    <header class="nav">
        <div class="logoBox">
            <img src="logo.jpg" alt="Car Spotter" class="luxury-logo-svg" style="width: 45px; height: 45px; border-radius: 50%;">
            <h1 class="logo-text">CAR SPOTTER</h1>
        </div>
        <nav class="nav-links">
            <a href="index.html">Showroom</a>
            <a href="inventory.html">Catalogo</a>
            <a href="configuratore.html">Configuratore</a>
            <a href="assistenza.html" class="active">Concierge</a>
        </nav>
        <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
    </header>

    <section class="top-space reveal">
        <span class="gold-tag">Canale Cifrato AES-256</span>
        <h2 style="font-size: 3rem; margin: 10px 0;">PRIVATE CONCIERGE</h2>
        <p>I nostri Private Broker sono a disposizione per transazioni Off-Market.</p>
    </section>

    <section class="reveal">
        <div class="form-container glass-panel">
            <h3 style="color: var(--gold); border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; margin-bottom: 20px;">Richiesta Accesso</h3>
            <form action="https://formspree.io/f/mlgvpkzy" method="POST">
                <input type="text" name="name" placeholder="Nome, Cognome e Società" required>
                <input type="email" name="email" placeholder="Indirizzo Email Verificato" required>
                <input type="tel" name="phone" placeholder="Numero Diretto (con prefisso int.)" required>
                <textarea name="message" rows="5" placeholder="Dettagli sulla vettura o richiesta..." required></textarea>
                <button type="submit" class="gold-btn">Richiedi Protocollo di Contatto</button>
            </form>
        </div>
    </section>

    <footer><p>CAR SPOTTER © 2026 — Protocollo di Sicurezza Attivo Server Milano</p></footer>

    <script src="script.js"></script>
</body>
</html>
